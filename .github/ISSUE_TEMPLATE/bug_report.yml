name: Bug Report
description: Something is broken or behaving unexpectedly.
labels: ["bug"]
body:
  - type: input
    id: parent-epic
    attributes:
      label: Related epic (if any)
      placeholder: "e.g. #109"
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing what is wrong.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "e.g. openeo.eurac.edu, helm chart version, image tag"
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0 — critical / blocking
        - P1 — high
        - P2 — medium
        - P3 — low / nice-to-have
    validations:
      required: true
