name: Build and publish DEDL Eurac executor image

on:
  push:
    branches:
      - dedl-eurac
    paths:
      - 'Dockerfile.executor-dedl-eurac'
      - 'openeo_argoworkflows/executor/openeo_argoworkflows_executor/executor.py'
      - '.github/workflows/build-executor-dedl-eurac.yaml'
  workflow_dispatch:
    inputs:
      base_executor_image:
        description: Base executor image to extend
        required: true
        default: ghcr.io/eurac-research-institute-for-eo/openeo-argoworkflows-executor:dedl-eurac
      dedl_package_ref:
        description: Git ref or SHA for openeo-processes-dedl-cube-load
        required: true
        default: main
      slim_package_ref:
        description: Git ref or SHA for Eurac openeo-processes-dask-slim
        required: true
        default: dev_remodel

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/openeo-argoworkflows-executor-dedl-eurac
  BASE_EXECUTOR_IMAGE: ${{ inputs.base_executor_image || 'ghcr.io/eurac-research-institute-for-eo/openeo-argoworkflows-executor:dedl-eurac' }}
  DEDL_PACKAGE_REF: ${{ inputs.dedl_package_ref || 'main' }}
  SLIM_PACKAGE_REF: ${{ inputs.slim_package_ref || 'dev_remodel' }}
  IS_REF_BRANCH: ${{ github.ref_name == 'dedl-eurac' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve openeo-processes-dedl-cube-load ref
        id: dedl
        env:
          EUMETSAT_GITLAB_TOKEN: ${{ secrets.EUMETSAT_GITLAB_TOKEN }}
        run: |
          set -euo pipefail
          ref="${DEDL_PACKAGE_REF}"
          if [ "$ref" = "main" ]; then
            ref="$(git \
              -c url."https://oauth2:${EUMETSAT_GITLAB_TOKEN}@gitlab.eumetsat.int/".insteadOf="https://gitlab.eumetsat.int/" \
              ls-remote https://gitlab.eumetsat.int/dedl-cube/openeo-processes-dedl-cube-load.git refs/heads/main \
              | awk '{print $1}')"
          fi
          if [ -z "$ref" ]; then
            echo "Could not resolve openeo-processes-dedl-cube-load ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Resolve openeo-processes-dask-slim ref
        id: slim
        run: |
          set -euo pipefail
          ref="${SLIM_PACKAGE_REF}"
          if [ "$ref" = "dev_remodel" ]; then
            ref="$(git ls-remote https://github.com/Eurac-Research-Institute-for-EO/openeo-processes-dask-slim.git refs/heads/dev_remodel | awk '{print $1}')"
          fi
          if [ -z "$ref" ]; then
            echo "Could not resolve openeo-processes-dask-slim ref" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable=${{ env.IS_REF_BRANCH }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.executor-dedl-eurac
          push: true
          build-args: |
            BASE_EXECUTOR_IMAGE=${{ env.BASE_EXECUTOR_IMAGE }}
            DEDL_PACKAGE_REF=${{ steps.dedl.outputs.ref }}
            SLIM_PACKAGE_REF=${{ steps.slim.outputs.ref }}
          secrets: |
            eumetsat_gitlab_token=${{ secrets.EUMETSAT_GITLAB_TOKEN }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
